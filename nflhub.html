<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>NFL Hub</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --accent:#3b82f6;--accent-2:#60a5fa;--green:#22c55e;--red:#ef4444;--gold:#f59e0b;
  --text:#f1f5f9;--muted:#94a3b8;--s1:#0f172a;--s2:#1e293b;--s3:#334155;
  --border:#334155;--border-2:#475569;--sh:0 8px 32px rgba(0,0,0,.4);
  --r-xs:8px;--r:14px;--r-lg:20px;
}
[data-theme="light"]{
  --text:#1e293b;--muted:#64748b;--s1:#f8fafc;--s2:#ffffff;--s3:#f1f5f9;
  --border:#e2e8f0;--border-2:#cbd5e1;--sh:0 8px 32px rgba(0,0,0,.08);
}
html,body{height:100%;font-family:'Inter',system-ui,sans-serif;background:var(--s1);color:var(--text);line-height:1.5}
input,select,button{font:inherit;color:var(--text)}
h1,h2,h3{line-height:1.2}
a{color:var(--accent);text-decoration:none}

/* ── TOPBAR ── */
.topbar{display:flex;align-items:center;justify-content:space-between;padding:12px 24px;
  background:var(--s2);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100;
  backdrop-filter:blur(16px)}
.brand{display:flex;align-items:center;gap:12px}
.brand h1{font-size:1.4rem;font-weight:900;letter-spacing:-.03em}
.brand h1 span{color:var(--accent)}
.brand-logo{width:36px;height:36px;background:var(--accent);border-radius:10px;
  display:grid;place-items:center}
.brand-logo svg{width:22px;height:22px}
.topbar-right{display:flex;align-items:center;gap:10px}
.badge-season{background:var(--accent);color:#fff;padding:3px 10px;border-radius:20px;font-size:.8rem;font-weight:700}
.icon-btn{background:var(--s3);border:1px solid var(--border-2);border-radius:var(--r-xs);
  padding:7px;display:grid;place-items:center;cursor:pointer;transition:.15s}
.icon-btn svg{width:18px;height:18px;display:block}
.icon-btn:hover{background:var(--border)}

/* ── NAV ── */
.nav-bar{display:flex;gap:6px;padding:14px 24px;background:var(--s2);
  border-bottom:1px solid var(--border);overflow-x:auto;-webkit-overflow-scrolling:touch}
.nav-pill{background:transparent;border:1.5px solid var(--border-2);border-radius:30px;
  padding:7px 20px;font-size:.88rem;font-weight:600;cursor:pointer;transition:.15s;white-space:nowrap;color:var(--muted)}
.nav-pill:hover{border-color:var(--accent);color:var(--text)}
.nav-pill.active{background:var(--accent);border-color:var(--accent);color:#fff}

/* ── MAIN ── */
.main{padding:24px;max-width:1400px;margin:0 auto}
.view{display:none;flex-direction:column;gap:24px}
.view.active{display:flex}

/* ── FILTER BAR ── */
.filter-bar{display:flex;flex-wrap:wrap;gap:12px;padding:16px 20px;
  background:var(--s2);border:1px solid var(--border);border-radius:var(--r)}
.filter-bar label{font-size:.82rem;font-weight:600;color:var(--muted);display:flex;flex-direction:column;gap:6px;flex:1;min-width:140px}
select,.search-input{
  padding:10px 14px;border-radius:var(--r-xs);background:var(--s3);border:1px solid var(--border-2);
  outline:none;font-size:.93rem;width:100%;transition:.15s;color:var(--text)}
select:focus,.search-input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(59,130,246,.2)}
.search-input::placeholder{color:var(--muted)}

/* ── BUTTONS ── */
.btn{padding:9px 20px;border-radius:var(--r-xs);border:none;cursor:pointer;font-weight:600;font-size:.9rem;transition:.15s}
.btn-primary{background:var(--accent);color:#fff}
.btn-primary:hover{background:var(--accent-2)}
.btn-ghost{background:var(--s3);color:var(--text);border:1px solid var(--border-2)}
.btn-ghost:hover{background:var(--border)}

/* ── TEAM GRID ── */
.team-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:14px}
.team-card{display:flex;align-items:center;gap:14px;padding:16px 18px;
  background:var(--s2);border:1.5px solid var(--border);border-radius:var(--r);
  cursor:pointer;transition:.15s;user-select:none}
.team-card:hover,.team-card.selected{border-color:var(--accent);transform:translateY(-3px);box-shadow:var(--sh)}
.team-card.selected{background:rgba(59,130,246,.08)}
.team-logo{border-radius:8px;object-fit:contain;flex-shrink:0;background:transparent}
.team-logo-err{width:72px;height:72px;border-radius:8px;background:var(--s3);display:grid;place-items:center;font-weight:800;font-size:1.1rem;flex-shrink:0;color:var(--muted)}
.team-name{font-size:.95rem;font-weight:700;line-height:1.3}
.team-abbr{font-size:.78rem;color:var(--muted);margin-top:2px}
.team-record{font-size:.82rem;font-weight:700;color:var(--accent);margin-top:4px}

/* ── PLAYER GRID ── */
.player-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:12px}
.player-card{display:flex;align-items:center;gap:12px;padding:12px 14px;
  background:var(--s2);border:1.5px solid var(--border);border-radius:var(--r);
  cursor:pointer;transition:.15s;user-select:none}
.player-card:hover,.player-card.selected{border-color:var(--accent);box-shadow:var(--sh)}
.player-photo-wrap{position:relative;flex-shrink:0}
.player-photo{width:52px;height:52px;border-radius:50%;object-fit:cover;background:var(--s3)}
.player-photo-fallback{width:52px;height:52px;border-radius:50%;background:var(--s3);display:grid;place-items:center;font-size:1.3rem;font-weight:800;color:var(--muted)}
.player-name{font-size:.88rem;font-weight:700;line-height:1.3}
.player-meta{display:flex;gap:6px;flex-wrap:wrap;align-items:center;margin-top:4px}
.pos-badge{background:var(--s3);border:1px solid var(--border-2);border-radius:5px;padding:2px 7px;font-size:.73rem;font-weight:700;color:var(--accent)}

/* ── DETAIL PANEL ── */
.detail-panel{display:none;background:var(--s2);border:1.5px solid var(--border);border-radius:var(--r-lg);padding:24px;position:relative;flex-direction:column;gap:16px}
.detail-panel.open{display:flex}
.detail-panel-close{position:absolute;top:16px;right:16px}
.detail-header{display:flex;gap:18px;align-items:flex-start;flex-wrap:wrap}
.detail-photo{width:100px;height:120px;object-fit:cover;border-radius:12px;background:var(--s3);flex-shrink:0}
.detail-info h2{font-size:1.4rem;font-weight:800}
.detail-info p{color:var(--muted);margin-top:4px;font-size:.9rem}
.divider{height:1px;background:var(--border)}
.section-title{font-size:.8rem;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--muted)}

/* ── TABLE ── */
.table-wrap{overflow-x:auto;border-radius:var(--r);border:1px solid var(--border)}
.table-wrap table{width:100%;border-collapse:collapse;font-size:.88rem}
.table-wrap th{background:var(--s3);padding:10px 14px;text-align:left;font-size:.78rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);white-space:nowrap}
.table-wrap td{padding:10px 14px;border-bottom:1px solid var(--border);vertical-align:middle}
.table-wrap tr:last-child td{border-bottom:none}
.table-wrap tr:hover td{background:rgba(59,130,246,.04)}
.td-num{text-align:center;font-variant-numeric:tabular-nums;font-weight:600}
.td-name{display:flex;align-items:center;gap:10px;font-weight:600;white-space:nowrap}
.val-pos{color:var(--green)}
.val-neg{color:var(--red)}
.val-gold{color:var(--gold)}

/* ── STANDINGS ── */
.conf-wrap{display:grid;grid-template-columns:1fr 1fr;gap:20px}
.conf-block{background:var(--s2);border:1px solid var(--border);border-radius:var(--r);overflow:hidden}
.conf-title{padding:14px 20px;font-size:1.05rem;font-weight:800;background:var(--s3);border-bottom:1px solid var(--border)}

/* ── CHIP ── */
.chip{display:inline-block;padding:3px 10px;border-radius:20px;font-size:.78rem;font-weight:600;background:var(--s3);color:var(--muted)}
.chip.accent{background:rgba(239,68,68,.15);color:var(--red)}
.chip.gold{background:rgba(245,158,11,.15);color:var(--gold)}

/* ── INFO BANNER ── */
.info-banner{padding:12px 16px;border-radius:var(--r-xs);background:rgba(59,130,246,.1);border:1px solid rgba(59,130,246,.3);color:var(--accent);font-size:.87rem;font-weight:500}

/* ── LIVE ── */
.live-header{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px}
.live-dot{width:10px;height:10px;border-radius:50%;background:var(--red);box-shadow:0 0 8px var(--red);animation:pulse 1.2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.live-games-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:14px}
.live-game-card{background:var(--s2);border:1.5px solid var(--border);border-radius:var(--r);padding:16px;cursor:pointer;transition:.15s}
.live-game-card:hover{border-color:var(--accent);box-shadow:var(--sh)}
.live-game-card.is-live{border-color:rgba(239,68,68,.4);box-shadow:0 0 16px rgba(239,68,68,.1)}
.lgc-header{display:flex;justify-content:space-between;font-size:.75rem;color:var(--muted);margin-bottom:12px}
.lgc-status-live{color:var(--red);font-weight:700}
.lgc-body{display:flex;flex-direction:column;gap:8px}
.lgc-team{display:flex;align-items:center;justify-content:space-between}
.lgc-team-left{display:flex;align-items:center;gap:10px}
.lgc-tname{font-weight:700;font-size:1rem}
.lgc-score{font-size:1.4rem;font-weight:900;font-variant-numeric:tabular-nums}
.lgc-div{height:1px;background:var(--border)}

/* ── PLAYS ── */
.plays-wrap{display:flex;flex-direction:column;gap:8px;max-height:500px;overflow-y:auto;padding-right:4px}
.play-row{padding:10px 14px;background:var(--s3);border-radius:var(--r-xs)}
.play-row-meta{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:5px}
.play-chip{background:var(--s2);border:1px solid var(--border);border-radius:5px;padding:2px 8px;font-size:.74rem;font-weight:600;color:var(--muted)}
.play-chip.scoring{background:rgba(34,197,94,.15);color:var(--green);border-color:rgba(34,197,94,.3)}
.play-desc{font-size:.87rem;color:var(--text);line-height:1.5}

/* ── MISC ── */
.spinner{width:36px;height:36px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite;margin:32px auto}
@keyframes spin{to{transform:rotate(360deg)}}
.empty{text-align:center;padding:48px 24px;color:var(--muted)}
.empty h3{font-size:1.1rem;font-weight:700;margin-bottom:8px;color:var(--text)}

@media(max-width:900px){
  .conf-wrap{grid-template-columns:1fr}
  .topbar{padding:12px 16px}
  .main{padding:16px}
  .filter-bar{padding:14px 16px}
}

</style>
</head>
<body>
<header class="topbar">
  <div class="brand">
    <div class="brand-logo">
      <svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5"><ellipse cx="12" cy="12" rx="9" ry="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="8" y1="7" x2="8" y2="17"/><line x1="16" y1="7" x2="16" y2="17"/></svg>
    </div>
    <div><h1>NFL<span>Hub</span></h1></div>
  </div>
  <div class="topbar-right">
    <span class="badge-season">2026</span>
    <button class="icon-btn" id="themeBtn" title="Toggle theme">
      <svg id="themeIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.2 4.2l1.4 1.4M18.4 18.4l1.4 1.4M1 12h2M21 12h2M4.2 19.8l1.4-1.4M18.4 5.6l1.4-1.4"/></svg>
    </button>
  </div>
</header>

<nav class="nav-bar">
  <button class="nav-pill active" data-view="teams">Teams</button>
  <button class="nav-pill" data-view="players">Players</button>
  <button class="nav-pill" data-view="stats">Stats</button>
  <button class="nav-pill" data-view="standings">Standings</button>
  <button class="nav-pill" data-view="schedule">Schedule</button>
  <button class="nav-pill" data-view="live">Live</button>
</nav>

<main class="main">

<section class="view active" id="view-teams">
  <div class="filter-bar">
    <label>Conference<select id="confFilter"><option value="">All</option><option value="AFC">AFC</option><option value="NFC">NFC</option></select></label>
    <label>Division<select id="divFilter"><option value="">All divisions</option><option value="East">East</option><option value="West">West</option><option value="North">North</option><option value="South">South</option></select></label>
    <label>Search<input class="search-input" id="teamSearch" type="text" placeholder="Team name..." autocomplete="off"></label>
  </div>
  <div id="teamGrid" class="team-grid"><div class="spinner"></div></div>
  <div class="detail-panel" id="teamDetail">
    <button class="btn btn-ghost detail-panel-close" id="closeTeamDetail">&#x2715; Close</button>
    <div class="detail-header" id="teamDetailHeader"></div>
    <div class="divider"></div>
    <p class="section-title" style="margin-top:16px">Roster</p>
    <div id="teamRoster" class="table-wrap"></div>
  </div>
</section>

<section class="view" id="view-players">
  <div class="filter-bar">
    <label>Team<select id="playerTeamFilter"><option value="">All teams</option></select></label>
    <label>Position
      <select id="playerPosFilter">
        <option value="">All positions</option>
        <option value="QB">QB</option>
        <option value="RB">RB</option>
        <option value="WR">WR</option>
        <option value="TE">TE</option>
        <option value="OL">OL</option>
        <option value="DL">DL</option>
        <option value="LB">LB</option>
        <option value="CB">CB</option>
        <option value="S">Safety</option>
        <option value="K">K</option>
        <option value="P">P</option>
      </select>
    </label>
    <label>Name<input class="search-input" id="playerSearch" type="text" placeholder="Player name..." autocomplete="off"></label>
  </div>
  <div id="playerStatus" style="padding:6px 2px;color:var(--muted);font-size:.88rem"></div>
  <div id="playerGrid" class="player-grid"></div>
  <div class="detail-panel" id="playerDetail">
    <button class="btn btn-ghost detail-panel-close" id="closePlayerDetail">&#x2715; Close</button>
    <div class="detail-header" id="playerDetailHeader"></div>
    <div class="divider"></div>
    <p class="section-title" style="margin-top:16px">Season stats</p>
    <div id="playerStatTable" class="table-wrap"></div>
  </div>
</section>

<section class="view" id="view-stats">
  <div class="filter-bar">
    <label>Season<input type="number" id="statSeason" value="2025" min="2000" max="2026" style="padding:10px 14px;border-radius:8px;background:var(--s3);border:1px solid var(--border-2);color:var(--text);width:100%"></label>
    <label>Category
      <select id="statCat">
        <option value="passingYards">Passing Yards</option>
        <option value="passingTouchdowns">Passing TDs</option>
        <option value="quarterbackRating">Passer Rating</option>
        <option value="rushingYards">Rushing Yards</option>
        <option value="rushingTouchdowns">Rushing TDs</option>
        <option value="receivingYards">Receiving Yards</option>
        <option value="receivingTouchdowns">Receiving TDs</option>
        <option value="receptions">Receptions</option>
        <option value="totalTackles">Tackles</option>
        <option value="sacks">Sacks</option>
        <option value="interceptions">Interceptions</option>
        <option value="passesDefended">Passes Defended</option>
        <option value="totalPoints">Total Points</option>
      </select>
    </label>
    <button class="btn btn-primary" id="statLoadBtn" style="margin-top:22px">Load</button>
  </div>
  <div id="statTable" class="table-wrap"><div class="empty"><h3>Pick a category and click Load</h3></div></div>
</section>

<section class="view" id="view-standings">
  <div class="conf-wrap" id="standingsWrap"><div class="spinner"></div></div>
</section>

<section class="view" id="view-schedule">
  <div class="filter-bar">
    <label>Season<input type="number" id="schedSeason" value="2026" min="2000" max="2027" style="padding:10px 14px;border-radius:8px;background:var(--s3);border:1px solid var(--border-2);color:var(--text);width:100%"></label>
    <label>Week
      <select id="schedWeek">
        <option value="">All weeks</option>
        <option>1</option><option>2</option><option>3</option><option>4</option>
        <option>5</option><option>6</option><option>7</option><option>8</option>
        <option>9</option><option>10</option><option>11</option><option>12</option>
        <option>13</option><option>14</option><option>15</option><option>16</option>
        <option>17</option><option>18</option>
      </select>
    </label>
    <label>Team<select id="schedTeam"><option value="">All teams</option></select></label>
    <label>Type
      <select id="schedType">
        <option value="auto">Auto-detect</option>
        <option value="1">Preseason</option>
        <option value="2">Regular Season</option>
        <option value="3">Postseason</option>
      </select>
    </label>
    <button class="btn btn-primary" id="schedLoadBtn" style="margin-top:22px">Load</button>
  </div>
  <div id="schedInfo" class="info-banner" style="display:none"></div>
  <div id="schedTable" class="table-wrap"><div class="spinner"></div></div>
</section>

<section class="view" id="view-live">
  <div class="live-header">
    <div style="display:flex;align-items:center;gap:10px">
      <span class="live-dot"></span>
      <h2 style="font-size:1.3rem;font-weight:800">Live Scoreboard</h2>
      <span class="chip" id="liveWeekBadge">Week —</span>
    </div>
    <div style="display:flex;gap:10px;align-items:center">
      <button class="btn btn-ghost" id="liveRefreshBtn">&#x27F3; Refresh</button>
      <button class="btn btn-primary" id="liveAutoBtn">Auto OFF</button>
    </div>
  </div>
  <div id="liveGamesGrid" class="live-games-grid"><div class="spinner"></div></div>
  <div class="detail-panel" id="livePlaysPanel">
    <button class="btn btn-ghost detail-panel-close" id="closeLivePlays">&#x2715; Close</button>
    <div id="livePlaysHeader"></div>
    <div class="plays-wrap" id="livePlaysWrap"></div>
  </div>
</section>

</main>

// ── helpers ─────────────────────────────────────────
function ge(id){ return document.getElementById(id); }
function qs(sel){ return document.querySelector(sel); }
function qsa(sel){ return Array.prototype.slice.call(document.querySelectorAll(sel)); }
function h(s){ return String(s==null?'—':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function logo(abbr){ return 'https://a.espncdn.com/i/teamlogos/nfl/500/'+abbr.toLowerCase()+'.png'; }
function face(id){ return 'https://a.espncdn.com/i/headshots/nfl/players/full/'+id+'.png'; }
function spin(){ return '<div class="spinner"></div>'; }
function empty(msg){ return '<div class="empty"><h3>'+h(msg)+'</h3></div>'; }

function get(url, done){
  var xhr = new XMLHttpRequest();
  xhr.open('GET', url, true);
  xhr.onreadystatechange = function(){
    if(xhr.readyState === 4){
      if(xhr.status === 200){
        try { done(null, JSON.parse(xhr.responseText)); }
        catch(e){ done(e, null); }
      } else {
        done(new Error('HTTP '+xhr.status), null);
      }
    }
  };
  xhr.send();
}

var teamRecords = {};

function initTeams(){
  get(ESPN+'/scoreboard', function(err, data){
    renderTeams();
  });
  get('https://site.api.espn.com/apis/v2/sports/football/nfl/standings?season=2025', function(err, data){
    if(err || !data) return;
    var confs = data.children || [];
    for(var i=0;i<confs.length;i++){
      var entries = (confs[i].standings && confs[i].standings.entries) || [];
      for(var j=0;j<entries.length;j++){
        var e = entries[j];
        var abbr = e.team && e.team.abbreviation;
        var stats = e.stats || [];
        var w='', l='';
        for(var k=0;k<stats.length;k++){
          if(stats[k].name==='wins') w = stats[k].value;
          if(stats[k].name==='losses') l = stats[k].value;
        }
        if(abbr) teamRecords[abbr] = w+'-'+l;
      }
    }
    renderTeams();
  });
  ge('confFilter').onchange = renderTeams;
  ge('divFilter').onchange  = renderTeams;
  ge('teamSearch').oninput  = renderTeams;
  ge('teamSearch').onkeyup  = renderTeams;
}

function renderTeams(){
  var conf = ge('confFilter').value;
  var div  = ge('divFilter').value;
  var q    = ge('teamSearch').value.toLowerCase().trim();
  var list = TEAMS.filter(function(t){
    if(conf && t.conf !== conf) return false;
    if(div  && t.div  !== div)  return false;
    if(q && t.name.toLowerCase().indexOf(q)===-1 && t.abbr.toLowerCase().indexOf(q)===-1) return false;
    return true;
  });
  if(!list.length){ ge('teamGrid').innerHTML = empty('No teams match.'); return; }
  var html = '';
  for(var i=0;i<list.length;i++){
    var t = list[i];
    var rec = teamRecords[t.abbr] ? '<div class="team-record">'+h(teamRecords[t.abbr])+'</div>' : '';
    html += '<div class="team-card" data-abbr="'+t.abbr+'" data-tid="'+t.id+'" tabindex="0">'
      + '<img src="'+logo(t.abbr)+'" class="team-logo" width="64" height="64" loading="lazy" '
      + 'onerror="this.outerHTML=\'<div class=\\\"team-logo-err\\\">'+t.abbr+'</div>\'">'
      + '<div><div class="team-name">'+h(t.name)+'</div>'
      + '<div class="team-abbr">'+h(t.conf)+' \xb7 '+h(t.div)+'</div>'+rec+'</div></div>';
  }
  ge('teamGrid').innerHTML = html;
  qsa('#teamGrid .team-card').forEach(function(card){
    card.onclick = function(){ openTeam(card.getAttribute('data-tid'), card.getAttribute('data-abbr')); };
  });
}

function openTeam(tid, abbr){
  qsa('#teamGrid .team-card').forEach(function(c){
    c.classList.toggle('selected', c.getAttribute('data-abbr')===abbr);
  });
  var panel = ge('teamDetail');
  panel.classList.add('open');
  panel.scrollIntoView({behavior:'smooth',block:'nearest'});
  var t = null;
  for(var i=0;i<TEAMS.length;i++){ if(TEAMS[i].abbr===abbr){ t=TEAMS[i]; break; } }
  ge('teamDetailHeader').innerHTML = '<img src="'+logo(abbr)+'" width="72" height="72" '
    + 'style="border-radius:12px;object-fit:contain;background:var(--s3)" onerror="this.style.opacity=\'.1\'">'
    + '<div><h2>'+h(t?t.name:abbr)+'</h2>'
    + '<p style="color:var(--muted)">'+(t?t.conf+' \xb7 '+t.div:'')
    + (teamRecords[abbr]?' \xb7 Record: <strong>'+h(teamRecords[abbr])+'</strong>':'')+'</p></div>';
  ge('teamRoster').innerHTML = spin();
  get(ESPN+'/teams/'+tid+'/roster', function(err, data){
    if(err || !data){ ge('teamRoster').innerHTML = empty('Could not load roster.'); return; }
    var groups = data.athletes || [];
    var players = [];
    for(var i=0;i<groups.length;i++){
      var items = groups[i].items || [];
      for(var j=0;j<items.length;j++) players.push(items[j]);
    }
    if(!players.length){ ge('teamRoster').innerHTML = empty('No roster data.'); return; }
    var rows = '';
    for(var i=0;i<players.length;i++){
      var p = players[i];
      rows += '<tr>'
        + '<td><img src="'+face(p.id)+'" width="30" height="34" style="border-radius:6px;object-fit:cover;vertical-align:middle" loading="lazy" onerror="this.style.opacity=\'.1\'"></td>'
        + '<td class="td-num">'+h(p.jersey||'—')+'</td>'
        + '<td style="font-weight:600;white-space:nowrap">'+h(p.displayName)+'</td>'
        + '<td><span class="pos-badge">'+h((p.position&&p.position.abbreviation)||'—')+'</span></td>'
        + '<td>'+h(p.displayHeight||'—')+'</td>'
        + '<td>'+h(p.displayWeight||'—')+'</td>'
        + '<td>'+(p.experience?h(p.experience.years):'—')+'</td>'
        + '<td style="color:var(--muted);font-size:.83rem">'+h((p.college&&p.college.name)||'—')+'</td>'
        + '</tr>';
    }
    ge('teamRoster').innerHTML = '<table><thead><tr>'
      + '<th></th><th>#</th><th>Name</th><th>Pos</th><th>Ht</th><th>Wt</th><th>Exp</th><th>College</th>'
      + '</tr></thead><tbody>'+rows+'</tbody></table>';
  });
}
ge('closeTeamDetail').onclick = function(){
  ge('teamDetail').classList.remove('open');
  qsa('#teamGrid .team-card').forEach(function(c){ c.classList.remove('selected'); });
};

var allPlayers = [];
var playersReady = false;
var loadedTeams = 0;

function initPlayers(){
  allPlayers = [];
  playersReady = false;
  loadedTeams = 0;
  ge('playerGrid').innerHTML = spin();
  ge('playerStatus').textContent = 'Loading all 32 team rosters... 0%';
  ge('playerTeamFilter').onchange = applyPlayerFilters;
  ge('playerPosFilter').onchange  = applyPlayerFilters;
  ge('playerSearch').oninput      = applyPlayerFilters;
  ge('playerSearch').onkeyup      = applyPlayerFilters;
  loadNextBatch(0);
}

function loadNextBatch(offset){
  var batch = TEAMS.slice(offset, offset+4);
  if(!batch.length){ onAllLoaded(); return; }
  var remaining = batch.length;
  for(var i=0;i<batch.length;i++){
    (function(team){
      get(ESPN+'/teams/'+team.id+'/roster', function(err, data){
        if(!err && data){
          var groups = data.athletes || [];
          for(var g=0;g<groups.length;g++){
            var items = groups[g].items || [];
            for(var k=0;k<items.length;k++){
              var p = items[k];
              p._teamAbbr = team.abbr;
              p._teamName = team.name;
              allPlayers.push(p);
            }
          }
        }
        loadedTeams++;
        var pct = Math.round((loadedTeams/TEAMS.length)*100);
        ge('playerStatus').textContent = 'Loading rosters... '+pct+'% ('+loadedTeams+'/'+TEAMS.length+' teams)';
        remaining--;
        if(remaining===0) loadNextBatch(offset+4);
      });
    })(batch[i]);
  }
}

function onAllLoaded(){
  playersReady = true;
  renderPlayers();
}

function applyPlayerFilters(){
  if(!playersReady) return;
  renderPlayers();
}

function renderPlayers(){
  var teamVal = ge('playerTeamFilter').value;
  var posVal  = ge('playerPosFilter').value;
  var q       = ge('playerSearch').value.toLowerCase().trim();

  var list = allPlayers;

  if(teamVal){
    list = list.filter(function(p){ return p._teamAbbr === teamVal; });
  }
  if(posVal){
    var allowed = POS_MAP[posVal] || [posVal];
    list = list.filter(function(p){
      var pa = ((p.position && p.position.abbreviation) || '').toUpperCase();
      for(var i=0;i<allowed.length;i++){ if(allowed[i]===pa) return true; }
      return false;
    });
  }
  if(q){
    list = list.filter(function(p){
      return (p.displayName||'').toLowerCase().indexOf(q) !== -1;
    });
  }

  var total = list.length;
  var show  = list.slice(0, 200);

  if(playersReady){
    ge('playerStatus').textContent = total + ' player'+(total!==1?'s':'')+' shown'
      + (total>200?' (showing first 200)':'')+'.'
  }

  if(!show.length){
    ge('playerGrid').innerHTML = empty('No players match your filters.');
    return;
  }

  var html = '';
  for(var i=0;i<show.length;i++){
    var p = show[i];
    var posAbbr = (p.position && p.position.abbreviation) || '—';
    var jersey  = p.jersey ? '#'+h(p.jersey) : '';
    html += '<div class="player-card" data-pid="'+h(p.id)+'" tabindex="0">'
      + '<div class="player-photo-wrap">'
      + '<img class="player-photo" src="'+face(p.id)+'" alt="" loading="lazy" '
      + 'onerror="this.style.display=\'none\';this.nextSibling.style.display=\'grid\'">'
      + '<div class="player-photo-fallback" style="display:none">'
      + h((p.displayName||'?').charAt(0))+'</div></div>'
      + '<div class="player-info">'
      + '<div class="player-name">'+h(p.displayName)+'</div>'
      + '<div class="player-meta">'
      + '<span class="pos-badge">'+h(posAbbr)+'</span>'
      + '<span>'+h(p._teamAbbr||'FA')+'</span>'
      + (jersey?'<span>'+jersey+'</span>':'')
      + '</div></div></div>';
  }
  ge('playerGrid').innerHTML = html;

  qsa('#playerGrid .player-card').forEach(function(card){
    card.onclick = function(){ openPlayer(card.getAttribute('data-pid')); };
  });
}

function openPlayer(pid){
  qsa('#playerGrid .player-card').forEach(function(c){
    c.classList.toggle('selected', c.getAttribute('data-pid')===pid);
  });
  var panel = ge('playerDetail');
  panel.classList.add('open');
  panel.scrollIntoView({behavior:'smooth',block:'nearest'});
  var p = null;
  for(var i=0;i<allPlayers.length;i++){ if(allPlayers[i].id===pid){ p=allPlayers[i]; break; } }
  var posName = (p && p.position && p.position.displayName) || '—';
  var college = (p && p.college && p.college.name) || '';
  ge('playerDetailHeader').innerHTML = '<img src="'+face(pid)+'" class="detail-photo" loading="lazy" '
    + 'onerror="this.style.opacity=\'.1\'">'
    + '<div class="detail-info">'
    + '<h2>'+(p?h(p.displayName):'—')+'</h2>'
    + '<p>'+h(posName)+' \xb7 '+h(p?p._teamName:'')+'</p>'
    + (p&&p.jersey?'<p>#'+h(p.jersey)+'</p>':'')
    + '<p>'+h(p&&p.displayHeight||'')+' / '+h(p&&p.displayWeight||'')+'</p>'
    + (college?'<p>'+h(college)+'</p>':'')
    + '</div>';
  ge('playerStatTable').innerHTML = spin();
  get('https://site.web.api.espn.com/apis/common/v3/sports/football/nfl/athletes/'+pid+'/overview',
    function(err, data){
      if(err || !data || !data.statistics){
        ge('playerStatTable').innerHTML = empty('Stats not available.'); return;
      }
      var st = data.statistics;
      var labels = st.displayNames || st.names || st.labels || [];
      var splits = st.splits || [];
      var season = null;
      for(var i=0;i<splits.length;i++){
        if(splits[i].displayName==='Regular Season'){ season=splits[i]; break; }
      }
      if(!season && splits.length) season=splits[0];
      if(!season || !labels.length){ ge('playerStatTable').innerHTML = empty('No stats.'); return; }
      var vals = season.stats || [];
      var thead = '<tr>';
      for(var i=0;i<labels.length;i++) thead += '<th>'+h(labels[i])+'</th>';
      thead += '</tr>';
      var tbody = '<tr>';
      for(var i=0;i<vals.length;i++) tbody += '<td class="td-num">'+h(vals[i])+'</td>';
      tbody += '</tr>';
      ge('playerStatTable').innerHTML = '<table><thead>'+thead+'</thead><tbody>'+tbody+'</tbody></table>';
    });
}
ge('closePlayerDetail').onclick = function(){
  ge('playerDetail').classList.remove('open');
  qsa('#playerGrid .player-card').forEach(function(c){ c.classList.remove('selected'); });
};

ge('statLoadBtn').onclick = loadStats;
ge('statCat').onchange    = loadStats;

function loadStats(){
  var season = ge('statSeason').value;
  var catKey = ge('statCat').value;
  ge('statTable').innerHTML = spin();
  get(ESPN+'/statistics?season='+season+'&seasontype=2', function(err, data){
    if(err || !data){ ge('statTable').innerHTML = empty('Could not load stats.'); return; }
    var cats = (data.stats && data.stats.categories) || [];
    var cat = null;
    for(var i=0;i<cats.length;i++){ if(cats[i].name===catKey){ cat=cats[i]; break; } }
    if(!cat){ ge('statTable').innerHTML = empty('No data for "'+catKey+'" in '+season+'.'); return; }
    var leaders = cat.leaders || [];
    if(!leaders.length){ ge('statTable').innerHTML = empty('No leaders found.'); return; }
    var rows = '';
    for(var i=0;i<Math.min(leaders.length,50);i++){
      var l   = leaders[i];
      var ath = l.athlete || {};
      var team = l.team || {};
      var tabbr = team.abbreviation || '';
      var hshot = (ath.headshot && ath.headshot.href) || face(ath.id);
      rows += '<tr>'
        + '<td class="td-num val-gold" style="font-size:1.1rem">'+(i+1)+'</td>'
        + '<td class="td-name"><img src="'+hshot+'" width="32" height="32" '
        + 'style="border-radius:8px;object-fit:cover" loading="lazy" onerror="this.style.opacity=\'.1\'">'
        + h(ath.displayName||'—')+'</td>'
        + '<td class="td-name">'
        + (tabbr?'<img src="'+logo(tabbr)+'" width="22" height="22" style="object-fit:contain" loading="lazy" onerror="this.style.opacity=\'.1\'"> ':'' )
        + h(tabbr||'—')+'</td>'
        + '<td class="td-num" style="font-size:1.15rem;font-weight:800">'+h(l.displayValue||'—')+'</td>'
        + '</tr>';
    }
    ge('statTable').innerHTML = '<table><thead><tr>'
      + '<th>Rank</th><th>Player</th><th>Team</th><th>'+h(cat.displayName)+'</th>'
      + '</tr></thead><tbody>'+rows+'</tbody></table>';
  });
}

// ====================================================
// SCHEDULE — auto-detect season type with fallback
// ====================================================
ge('schedLoadBtn').onclick = loadSchedule;

var SEASON_TYPE_LABELS = {1:'Preseason', 2:'Regular Season', 3:'Postseason'};

function loadSchedule(){
  var season  = parseInt(ge('schedSeason').value, 10) || 2026;
  var week    = ge('schedWeek').value;
  var team    = ge('schedTeam').value;
  var typeVal = ge('schedType').value;
  var infoEl  = ge('schedInfo');

  ge('schedTable').innerHTML = spin();
  infoEl.style.display = 'none';

  if(typeVal === 'auto'){
    trySeasonTypes(season, week, team, [2, 1, 3], infoEl);
  } else {
    fetchSchedule(season, week, team, parseInt(typeVal, 10), function(events, seasonType){
      renderSchedule(events, season, seasonType, infoEl);
    }, function(){
      ge('schedTable').innerHTML = empty('No games found for '+season+' season type '+typeVal+'.');
    });
  }
}

function trySeasonTypes(season, week, team, types, infoEl){
  if(!types.length){
    ge('schedTable').innerHTML = empty('No schedule data found for the '+season+' NFL season yet. Check back closer to the preseason (August).');
    return;
  }
  var type = types[0];
  var rest = types.slice(1);
  fetchSchedule(season, week, team, type, function(events, seasonType){
    renderSchedule(events, season, seasonType, infoEl);
  }, function(){
    trySeasonTypes(season, week, team, rest, infoEl);
  });
}

function fetchSchedule(season, week, team, seasonType, onSuccess, onFail){
  var url = ESPN+'/scoreboard?season='+season+'&seasontype='+seasonType+'&limit=300';
  if(week) url += '&week='+week;
  get(url, function(err, data){
    if(err || !data){ onFail(); return; }
    var events = data.events || [];
    if(team){
      events = events.filter(function(ev){
        var comps = (ev.competitions && ev.competitions[0] && ev.competitions[0].competitors) || [];
        for(var i=0;i<comps.length;i++){
          if(comps[i].team && comps[i].team.abbreviation===team) return true;
        }
        return false;
      });
    }
    if(!events.length){ onFail(); return; }
    onSuccess(events, seasonType);
  });
}

function renderSchedule(events, season, seasonType, infoEl){
  var typeLabel = SEASON_TYPE_LABELS[seasonType] || 'Season';
  infoEl.style.display = 'block';
  infoEl.innerHTML = '\uD83D\uDCC5 Showing <strong>'+season+' NFL '+typeLabel+'</strong> — '
    + events.length+' game'+(events.length!==1?'s':'')+' found.'
    + (seasonType===1?' Regular season kicks off September 4, 2026.':'');

  if(!events.length){ ge('schedTable').innerHTML = empty('No games found.'); return; }

  var rows = '';
  for(var i=0;i<events.length;i++){
    var ev   = events[i];
    var comp = (ev.competitions && ev.competitions[0]) || {};
    var comps = comp.competitors || [];
    var away = null, home = null;
    for(var j=0;j<comps.length;j++){
      if(comps[j].homeAway==='away') away=comps[j];
      else home=comps[j];
    }
    away = away || {}; home = home || {};
    var status      = (comp.status && comp.status.type) || {};
    var isLive      = status.name==='STATUS_IN_PROGRESS';
    var isScheduled = status.name==='STATUS_SCHEDULED';
    var awayAbbr    = (away.team && away.team.abbreviation) || '';
    var homeAbbr    = (home.team && home.team.abbreviation) || '';
    var rawDate     = ev.date ? new Date(ev.date) : null;
    var dateStr     = rawDate ? rawDate.toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'}) : '—';
    var timeStr     = rawDate ? rawDate.toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'}) : '';
    var awayScore   = isScheduled ? '' : (away.score || '—');
    var homeScore   = isScheduled ? '' : (home.score || '—');
    rows += '<tr'+(isLive?' style="background:rgba(239,68,68,.06)"':'')+'>'+
      '<td style="color:var(--muted);font-size:.83rem;white-space:nowrap">'+h(dateStr)+(timeStr?'<br><span style="font-size:.76rem">'+h(timeStr)+'</span>':'')+'</td>'+
      '<td class="td-name">'+(awayAbbr?'<img src="'+logo(awayAbbr)+'" width="22" height="22" style="object-fit:contain;border-radius:4px" loading="lazy" onerror="this.style.opacity=\'.1\'"> ':'')+h(awayAbbr||'—')+'</td>'+
      '<td class="td-num"'+(away.winner?' style="color:var(--green);font-weight:800"':'')+'>'+h(awayScore)+'</td>'+
      '<td class="td-name">'+(homeAbbr?'<img src="'+logo(homeAbbr)+'" width="22" height="22" style="object-fit:contain;border-radius:4px" loading="lazy" onerror="this.style.opacity=\'.1\'"> ':'')+h(homeAbbr||'—')+'</td>'+
      '<td class="td-num"'+(home.winner?' style="color:var(--green);font-weight:800"':'')+'>'+h(homeScore)+'</td>'+
      '<td><span class="chip'+(isLive?' accent':isScheduled?' gold':'')+'>'+(isLive?'🔴 LIVE':h(status.shortDetail||'—'))+'</span></td>'+
      '<td class="td-num" style="color:var(--muted)">'+h(ev.week&&ev.week.number||'—')+'</td>'+
      '</tr>';
  }
  ge('schedTable').innerHTML = '<table><thead><tr>'+
    '<th>Date</th><th>Away</th><th>Score</th><th>Home</th><th>Score</th><th>Status</th><th>Wk</th>'+
    '</tr></thead><tbody>'+rows+'</tbody></table>';
}

// ====================================================
// LIVE
// ====================================================
var autoTimer = null;

ge('liveRefreshBtn').onclick = loadLive;
ge('liveAutoBtn').onclick = function(){
  var btn = ge('liveAutoBtn');
  if(autoTimer){
    clearInterval(autoTimer);
    autoTimer = null;
    btn.textContent = 'Auto OFF';
  } else {
    loadLive();
    autoTimer = setInterval(loadLive, 30000);
    btn.textContent = 'Auto ON';
  }
};

function loadLive(){
  get(ESPN+'/scoreboard', function(err, data){
    if(err || !data){ ge('liveGamesGrid').innerHTML = empty('Could not load scoreboard.'); return; }
    var events = data.events || [];
    var week = data.week && data.week.number;
    ge('liveWeekBadge').textContent = week ? 'Week '+week : '—';
    if(!events.length){
      ge('liveGamesGrid').innerHTML = empty('No games today. The 2026 NFL regular season starts September 4.');
      return;
    }
    var html = '';
    for(var i=0;i<events.length;i++){
      var ev   = events[i];
      var comp = (ev.competitions && ev.competitions[0]) || {};
      var comps = comp.competitors || [];
      var away = null, home = null;
      for(var j=0;j<comps.length;j++){
        if(comps[j].homeAway==='away') away=comps[j]; else home=comps[j];
      }
      away = away||{}; home = home||{};
      var status = (comp.status && comp.status.type) || {};
      var isLive = status.name==='STATUS_IN_PROGRESS';
      var awayLogo = (away.team && away.team.logo) || logo((away.team&&away.team.abbreviation)||'nfl');
      var homeLogo = (home.team && home.team.logo) || logo((home.team&&home.team.abbreviation)||'nfl');
      html += '<div class="live-game-card'+(isLive?' is-live':'')+'\" data-gid="'+h(ev.id)+'">'
        + '<div class="lgc-header">'
        + '<span>'+h((ev.week&&ev.week.text)||'NFL')+'</span>'
        + '<span class="'+(isLive?'lgc-status-live':'')+'">'+h(status.shortDetail||'—')+'</span></div>'
        + '<div class="lgc-body">'
        + '<div class="lgc-team"><div class="lgc-team-left">'
        + '<img src="'+awayLogo+'" width="36" height="36" style="object-fit:contain" onerror="this.style.opacity=\'.2\'">'
        + '<span class="lgc-tname">'+h((away.team&&away.team.abbreviation)||'—')+'</span>'
        + '</div><span class="lgc-score">'+h(away.score||'—')+'</span></div>'
        + '<div class="lgc-div"></div>'
        + '<div class="lgc-team"><div class="lgc-team-left">'
        + '<img src="'+homeLogo+'" width="36" height="36" style="object-fit:contain" onerror="this.style.opacity=\'.2\'">'
        + '<span class="lgc-tname">'+h((home.team&&home.team.abbreviation)||'—')+'</span>'
        + '</div><span class="lgc-score">'+h(home.score||'—')+'</span></div></div></div>';
    }
    ge('liveGamesGrid').innerHTML = html;
    qsa('#liveGamesGrid .live-game-card').forEach(function(card){
      card.onclick = function(){ openLive(card.getAttribute('data-gid')); };
    });
  });
}

function openLive(gid){
  var panel = ge('livePlaysPanel');
  panel.classList.add('open');
  panel.scrollIntoView({behavior:'smooth',block:'nearest'});
  ge('livePlaysWrap').innerHTML = spin();
  get(ESPN+'/summary?event='+gid, function(err, data){
    if(err || !data){ ge('livePlaysWrap').innerHTML = empty('Could not load plays.'); return; }
    var comps = (data.header && data.header.competitions && data.header.competitions[0] && data.header.competitions[0].competitors) || [];
    var away=null,home=null;
    for(var i=0;i<comps.length;i++){ if(comps[i].homeAway==='away') away=comps[i]; else home=comps[i]; }
    away=away||{}; home=home||{};
    ge('livePlaysHeader').innerHTML = '<div style="display:flex;align-items:center;gap:16px;flex-wrap:wrap;margin-bottom:14px">'
      + '<img src="'+logo((away.team&&away.team.abbreviation)||'nfl')+'" width="44" height="44" style="object-fit:contain">'
      + '<div><div style="font-size:1.2rem;font-weight:900">'
      + h((away.team&&away.team.displayName)||'?')+' @ '+h((home.team&&home.team.displayName)||'?')+'</div>'
      + '<div style="color:var(--muted)">'+h(away.score||'—')+' \u2013 '+h(home.score||'—')+'</div></div>'
      + '<img src="'+logo((home.team&&home.team.abbreviation)||'nfl')+'" width="44" height="44" style="object-fit:contain">'
      + '</div>';
    var drives = data.drives || {};
    var allDrives = (drives.previous||[]).concat(drives.current?[drives.current]:[]);
    var plays = [];
    for(var i=0;i<allDrives.length;i++){
      var dp = allDrives[i].plays||[];
      for(var j=0;j<dp.length;j++) plays.push(dp[j]);
    }
    plays = plays.slice(-80).reverse();
    if(!plays.length){ ge('livePlaysWrap').innerHTML = empty('No plays yet.'); return; }
    var html = '';
    for(var i=0;i<plays.length;i++){
      var p = plays[i];
      var chips = '';
      if(p.period&&p.period.number) chips += '<span class="play-chip">Q'+h(p.period.number)+'</span>';
      if(p.clock&&p.clock.displayValue) chips += '<span class="play-chip">'+h(p.clock.displayValue)+'</span>';
      if(p.start&&p.start.downDistanceText) chips += '<span class="play-chip">'+h(p.start.downDistanceText)+'</span>';
      if(p.type&&p.type.text) chips += '<span class="play-chip">'+h(p.type.text)+'</span>';
      if(p.statYardage) chips += '<span class="play-chip">'+h(p.statYardage)+' yds</span>';
      if(p.scoringPlay) chips += '<span class="play-chip scoring">\u2b06 SCORE</span>';
      html += '<div class="play-row"><div class="play-row-meta">'+chips+'</div>'
        + '<div class="play-desc">'+h(p.text||'')+'</div></div>';
    }
    ge('livePlaysWrap').innerHTML = html;
  });
}
ge('closeLivePlays').onclick = function(){ ge('livePlaysPanel').classList.remove('open'); };

</script>
</body>
